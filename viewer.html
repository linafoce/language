<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Redirecting...</title>
  <style>
    body {
      margin: 0;
      padding: 24px;
      background: #f6f8fa;
      color: #24292f;
      font-family: "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
      line-height: 1.6;
    }
    .card {
      max-width: 760px;
      margin: 0 auto;
      background: #fff;
      border: 1px solid #d0d7de;
      border-radius: 10px;
      padding: 16px;
    }
    h1 { margin: 0 0 8px; font-size: 22px; }
    p { margin: 8px 0; }
    a { color: #0969da; text-decoration: none; }
    a:hover { text-decoration: underline; }
    code {
      background: #f6f8fa;
      border: 1px solid #d0d7de;
      border-radius: 6px;
      padding: 1px 5px;
      word-break: break-all;
    }
  </style>
</head>
<body>
  <section class="card">
    <h1>Redirecting to pre-rendered note page...</h1>
    <p id="status">Checking file path...</p>
    <p><a href="./index.html">Back to index</a></p>
  </section>

  <script>
    (function () {
      const statusEl = document.getElementById("status");
      const params = new URLSearchParams(window.location.search);
      const file = (params.get("file") || "").replace(/^\/+/, "");

      if (!file) {
        statusEl.innerHTML = "Missing <code>file</code> parameter. Example: <code>viewer.html?file=courses%2FN2.md</code>";
        return;
      }

      if (!/^(inbox|courses|topics)\/.+\.md$/i.test(file)) {
        statusEl.innerHTML = "Invalid path: <code>" + file + "</code>. Only .md files under inbox/courses/topics are allowed.";
        return;
      }

      const parts = file.split("/");
      const name = parts.pop();
      const htmlName = name.replace(/\.md$/i, ".html");
      parts.push(htmlName);
      const target = "notes/" + parts.map(encodeURIComponent).join("/") + (window.location.hash || "");

      statusEl.innerHTML = "Redirecting to <code>" + target + "</code> ...";
      window.location.replace(target);
    })();
  </script>
</body>
</html>
