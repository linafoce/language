<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>笔记阅读</title>
  <style>
    :root {
      --bg: #f6f8fa;
      --card: #ffffff;
      --text: #24292f;
      --muted: #57606a;
      --line: #d0d7de;
      --link: #0969da;
      --active-bg: #ddf4ff;
      --active-text: #0550ae;
      --shadow: 0 8px 24px rgba(31, 35, 40, 0.15);
    }

    * { box-sizing: border-box; }
    html { scroll-behavior: smooth; }

    body {
      margin: 0;
      font-family: "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.7;
    }

    .wrap {
      max-width: 1280px;
      margin: 24px auto;
      padding: 0 16px;
    }

    .card {
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 10px;
      padding: 16px;
    }

    .head {
      margin-bottom: 16px;
    }

    .meta {
      margin: 0 0 8px;
      color: var(--muted);
      font-size: 14px;
      word-break: break-all;
    }

    .actions {
      margin: 0;
      font-size: 14px;
    }

    .actions a {
      color: var(--link);
      text-decoration: none;
      margin-right: 12px;
    }

    .actions a:hover { text-decoration: underline; }

    .layout {
      display: grid;
      grid-template-columns: minmax(0, 1fr) 300px;
      gap: 16px;
      align-items: start;
    }

    #content {
      min-width: 0;
    }

    #content pre {
      overflow-x: auto;
      background: #f6f8fa;
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 10px;
    }

    #content code {
      background: #f6f8fa;
      border: 1px solid var(--line);
      border-radius: 6px;
      padding: 1px 4px;
    }

    #content blockquote {
      border-left: 4px solid #d0d7de;
      margin: 0;
      padding-left: 12px;
      color: #57606a;
    }

    #content h1,
    #content h2,
    #content h3 {
      scroll-margin-top: 18px;
    }

    .toc-panel {
      position: sticky;
      top: 12px;
      max-height: calc(100vh - 24px);
      overflow-y: auto;
    }

    .toc-title {
      margin: 0 0 8px;
      font-size: 18px;
    }

    .toc-nav {
      font-size: 14px;
      line-height: 1.5;
    }

    .toc-nav ul {
      list-style: none;
      margin: 0;
      padding: 0;
    }

    .toc-nav li {
      margin: 4px 0;
    }

    .toc-nav a {
      color: #1f2328;
      text-decoration: none;
      display: block;
      padding: 3px 6px;
      border-radius: 6px;
      word-break: break-word;
    }

    .toc-nav a:hover {
      background: #f6f8fa;
    }

    .toc-nav a.active {
      background: var(--active-bg);
      color: var(--active-text);
      font-weight: 600;
    }

    .toc-level-2 { margin-left: 14px; }
    .toc-level-3 { margin-left: 28px; }

    .desktop-toc-empty {
      color: var(--muted);
      margin: 0;
    }

    .toc-fab {
      position: fixed;
      right: 16px;
      bottom: 20px;
      z-index: 1000;
      display: none;
      border: 0;
      border-radius: 999px;
      padding: 12px 16px;
      font-size: 14px;
      font-weight: 600;
      color: #ffffff;
      background: #0969da;
      box-shadow: var(--shadow);
      cursor: pointer;
    }

    .toc-fab:focus-visible {
      outline: 2px solid #ffffff;
      outline-offset: 2px;
    }

    .toc-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.35);
      z-index: 1001;
    }

    .toc-overlay[hidden] {
      display: none;
    }

    .toc-drawer {
      position: fixed;
      right: 0;
      top: 0;
      width: min(88vw, 380px);
      height: 100vh;
      background: #ffffff;
      border-left: 1px solid var(--line);
      box-shadow: var(--shadow);
      transform: translateX(100%);
      transition: transform 0.2s ease;
      z-index: 1002;
      display: flex;
      flex-direction: column;
    }

    .toc-drawer.open {
      transform: translateX(0);
    }

    .toc-drawer-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 16px;
      border-bottom: 1px solid var(--line);
    }

    .toc-drawer-head h2 {
      margin: 0;
      font-size: 18px;
    }

    .toc-drawer-close {
      border: 0;
      background: transparent;
      font-size: 24px;
      line-height: 1;
      cursor: pointer;
      color: #57606a;
      padding: 0 4px;
    }

    .toc-drawer-body {
      overflow-y: auto;
      padding: 12px 12px 20px;
    }

    .toc-drawer-empty {
      color: var(--muted);
      margin: 0;
      padding: 8px;
    }

    @media (max-width: 1024px) {
      .layout {
        grid-template-columns: 1fr;
      }

      .desktop-toc {
        display: none;
      }

      .toc-fab {
        display: inline-block;
      }
    }
  </style>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
</head>
<body>
  <div class="wrap">
    <section class="card head">
      <h1 id="title">加载中...</h1>
      <p id="path" class="meta"></p>
      <p class="actions">
        <a href="./">返回首页</a>
        <a id="raw-link" target="_blank" rel="noopener noreferrer">打开源文件</a>
      </p>
    </section>

    <section class="layout">
      <article id="content" class="card"></article>
      <aside class="desktop-toc">
        <div id="desktop-toc-panel" class="card toc-panel">
          <h2 class="toc-title">目录</h2>
          <nav id="desktop-toc" class="toc-nav"></nav>
        </div>
      </aside>
    </section>
  </div>

  <button id="toc-fab" class="toc-fab" type="button" aria-controls="toc-drawer" aria-expanded="false">目录</button>
  <div id="toc-overlay" class="toc-overlay" hidden></div>
  <aside id="toc-drawer" class="toc-drawer" aria-hidden="true">
    <div class="toc-drawer-head">
      <h2>目录</h2>
      <button id="toc-drawer-close" class="toc-drawer-close" type="button" aria-label="关闭目录">×</button>
    </div>
    <div class="toc-drawer-body">
      <nav id="mobile-toc" class="toc-nav"></nav>
    </div>
  </aside>

  <script>
    (function () {
      const OWNER = "linafoce";
      const REPO = "language";
      const BRANCH = "main";

      const titleEl = document.getElementById("title");
      const pathEl = document.getElementById("path");
      const contentEl = document.getElementById("content");
      const rawEl = document.getElementById("raw-link");

      const desktopTocEl = document.getElementById("desktop-toc");
      const mobileTocEl = document.getElementById("mobile-toc");
      const tocFabEl = document.getElementById("toc-fab");
      const drawerEl = document.getElementById("toc-drawer");
      const overlayEl = document.getElementById("toc-overlay");
      const drawerCloseEl = document.getElementById("toc-drawer-close");

      let observedHeadings = [];
      let tocLinkById = {};
      let activeId = "";
      let observer = null;

      function slugify(text) {
        const cleaned = text
          .trim()
          .toLowerCase()
          .replace(/\s+/g, "-")
          .replace(/[^\w\u4e00-\u9fa5-]/g, "");
        return cleaned || "section";
      }

      function openDrawer() {
        drawerEl.classList.add("open");
        drawerEl.setAttribute("aria-hidden", "false");
        overlayEl.hidden = false;
        tocFabEl.setAttribute("aria-expanded", "true");
      }

      function closeDrawer() {
        drawerEl.classList.remove("open");
        drawerEl.setAttribute("aria-hidden", "true");
        overlayEl.hidden = true;
        tocFabEl.setAttribute("aria-expanded", "false");
      }

      function isMobileLayout() {
        return window.matchMedia("(max-width: 1024px)").matches;
      }

      function getAdaptiveHeadings() {
        const headings = Array.from(contentEl.querySelectorAll("h1, h2, h3"));
        const count = { h1: 0, h2: 0, h3: 0 };

        headings.forEach(function (h) {
          const key = h.tagName.toLowerCase();
          count[key] += 1;
        });

        const total = headings.length;
        const sub = count.h2 + count.h3;
        const fallbackToH1 =
          sub === 0 ||
          (total > 0 && sub / total < 0.25) ||
          (total > 120 && count.h1 / total > 0.75);

        if (fallbackToH1) {
          return headings.filter(function (h) { return h.tagName === "H1"; });
        }

        return headings;
      }

      function createTocItem(id, text, level) {
        const li = document.createElement("li");
        li.className = "toc-level-" + level;

        const a = document.createElement("a");
        a.href = "#" + id;
        a.dataset.targetId = id;
        a.textContent = text;

        li.appendChild(a);
        return li;
      }

      function setActive(id) {
        if (!id || activeId === id) {
          return;
        }
        activeId = id;

        Object.keys(tocLinkById).forEach(function (key) {
          const links = tocLinkById[key];
          links.forEach(function (link) {
            link.classList.toggle("active", key === id);
          });
        });

        const desktopLinks = tocLinkById[id] || [];
        const desktopLink = desktopLinks.find(function (link) {
          return link.closest("#desktop-toc");
        });

        if (desktopLink) {
          desktopLink.scrollIntoView({ block: "nearest" });
        }
      }

      function updateActiveFromViewport() {
        if (!observedHeadings.length) {
          return;
        }

        const triggerY = window.innerHeight * 0.28;
        let candidate = observedHeadings[0].id;

        for (let i = 0; i < observedHeadings.length; i += 1) {
          const top = observedHeadings[i].getBoundingClientRect().top;
          if (top <= triggerY) {
            candidate = observedHeadings[i].id;
          } else {
            break;
          }
        }

        setActive(candidate);
      }

      function setupObserver() {
        if (observer) {
          observer.disconnect();
        }

        observer = new IntersectionObserver(
          function () {
            updateActiveFromViewport();
          },
          {
            root: null,
            threshold: [0, 0.25, 0.5, 1],
            rootMargin: "-20% 0px -70% 0px"
          }
        );

        observedHeadings.forEach(function (heading) {
          observer.observe(heading);
        });
      }

      function mountEmptyToc() {
        desktopTocEl.innerHTML = '<p class="desktop-toc-empty">暂无目录</p>';
        mobileTocEl.innerHTML = '<p class="toc-drawer-empty">暂无目录</p>';
        tocFabEl.style.display = "none";
      }

      function renderToc() {
        const headings = getAdaptiveHeadings();
        desktopTocEl.innerHTML = "";
        mobileTocEl.innerHTML = "";
        tocLinkById = {};
        activeId = "";

        if (!headings.length) {
          mountEmptyToc();
          return;
        }

        const used = {};
        const desktopList = document.createElement("ul");
        const mobileList = document.createElement("ul");

        observedHeadings = headings.map(function (heading) {
          const text = heading.textContent.trim();
          const level = Number(heading.tagName.slice(1));
          const base = slugify(text);
          let id = base;
          let n = 2;

          while (used[id]) {
            id = base + "-" + n;
            n += 1;
          }
          used[id] = true;
          heading.id = id;

          const desktopItem = createTocItem(id, text, level);
          const mobileItem = createTocItem(id, text, level);

          desktopList.appendChild(desktopItem);
          mobileList.appendChild(mobileItem);

          tocLinkById[id] = [
            desktopItem.querySelector("a"),
            mobileItem.querySelector("a")
          ];

          return heading;
        });

        desktopTocEl.appendChild(desktopList);
        mobileTocEl.appendChild(mobileList);

        const allLinks = document.querySelectorAll("#desktop-toc a, #mobile-toc a");
        allLinks.forEach(function (link) {
          link.addEventListener("click", function () {
            const id = link.dataset.targetId;
            setActive(id);
            if (isMobileLayout()) {
              closeDrawer();
            }
          });
        });

        setActive(observedHeadings[0].id);
        setupObserver();

        if (isMobileLayout()) {
          tocFabEl.style.display = "inline-block";
        }
      }

      tocFabEl.addEventListener("click", function () {
        if (drawerEl.classList.contains("open")) {
          closeDrawer();
        } else {
          openDrawer();
        }
      });

      drawerCloseEl.addEventListener("click", closeDrawer);
      overlayEl.addEventListener("click", closeDrawer);

      document.addEventListener("keydown", function (evt) {
        if (evt.key === "Escape") {
          closeDrawer();
        }
      });

      window.addEventListener("resize", function () {
        if (!isMobileLayout()) {
          closeDrawer();
          tocFabEl.style.display = "none";
        } else if (observedHeadings.length > 0) {
          tocFabEl.style.display = "inline-block";
        }
      });

      const params = new URLSearchParams(window.location.search);
      const file = params.get("file");

      if (!file) {
        titleEl.textContent = "缺少 file 参数";
        pathEl.textContent = "请从首页进入。";
        contentEl.innerHTML = "<p>示例：<code>viewer.html?file=courses%2FN2.md</code></p>";
        mountEmptyToc();
        return;
      }

      const normalized = file.replace(/^\/+/, "");
      if (!/^(inbox|courses|topics)\/.+\.md$/i.test(normalized)) {
        titleEl.textContent = "不允许的文件路径";
        pathEl.textContent = normalized;
        contentEl.innerHTML = "<p>仅支持 inbox/courses/topics 下的 .md 文件。</p>";
        mountEmptyToc();
        return;
      }

      const rawUrl = "https://raw.githubusercontent.com/" + OWNER + "/" + REPO + "/" + BRANCH + "/" + normalized;
      titleEl.textContent = normalized.split("/").pop() || normalized;
      pathEl.textContent = normalized;
      rawEl.href = rawUrl;

      fetch(rawUrl, { cache: "no-store" })
        .then(function (resp) {
          if (!resp.ok) {
            throw new Error("HTTP " + resp.status);
          }
          return resp.text();
        })
        .then(function (md) {
          if (window.marked && typeof window.marked.parse === "function") {
            contentEl.innerHTML = window.marked.parse(md);
          } else {
            contentEl.innerHTML = "<pre></pre>";
            contentEl.querySelector("pre").textContent = md;
          }
          renderToc();
        })
        .catch(function (err) {
          contentEl.innerHTML = "<p>加载失败：" + err.message + "</p>";
          mountEmptyToc();
        });
    })();
  </script>
</body>
</html>
