<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>笔记阅读</title>
  <style>
    :root {
      --bg: #f6f8fa;
      --card: #ffffff;
      --text: #24292f;
      --muted: #57606a;
      --line: #d0d7de;
    }

    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.7;
    }

    .wrap {
      max-width: 980px;
      margin: 24px auto;
      padding: 0 16px;
    }

    .card {
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 10px;
      padding: 16px;
    }

    .meta {
      margin: 0 0 12px;
      color: var(--muted);
      font-size: 14px;
    }

    .actions {
      margin: 0 0 16px;
      font-size: 14px;
    }

    .actions a { margin-right: 12px; }

    .markdown {
      white-space: normal;
      word-break: break-word;
    }

    .markdown pre {
      overflow-x: auto;
      background: #f6f8fa;
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 10px;
    }

    .markdown code {
      background: #f6f8fa;
      border: 1px solid var(--line);
      border-radius: 6px;
      padding: 1px 4px;
    }

    .markdown blockquote {
      border-left: 4px solid #d0d7de;
      margin: 0;
      padding-left: 12px;
      color: #57606a;
    }
  </style>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
</head>
<body>
  <div class="wrap">
    <div class="card">
      <h1 id="title">加载中...</h1>
      <p id="path" class="meta"></p>
      <p class="actions">
        <a href="./">返回首页</a>
        <a id="raw-link" target="_blank" rel="noopener noreferrer">打开源文件</a>
      </p>
      <article id="content" class="markdown"></article>
    </div>
  </div>

  <script>
    (function () {
      const OWNER = "linafoce";
      const REPO = "language";
      const BRANCH = "main";
      const titleEl = document.getElementById("title");
      const pathEl = document.getElementById("path");
      const contentEl = document.getElementById("content");
      const rawEl = document.getElementById("raw-link");

      const params = new URLSearchParams(window.location.search);
      const file = params.get("file");

      if (!file) {
        titleEl.textContent = "缺少 file 参数";
        pathEl.textContent = "请从首页进入。";
        contentEl.innerHTML = "<p>示例：<code>viewer.html?file=courses%2FN2.md</code></p>";
        return;
      }

      const normalized = file.replace(/^\/+/, "");
      if (!/^(inbox|courses|topics)\/.+\.md$/i.test(normalized)) {
        titleEl.textContent = "不允许的文件路径";
        pathEl.textContent = normalized;
        contentEl.innerHTML = "<p>仅支持 inbox/courses/topics 下的 .md 文件。</p>";
        return;
      }

      const rawUrl = "https://raw.githubusercontent.com/" + OWNER + "/" + REPO + "/" + BRANCH + "/" + normalized;
      titleEl.textContent = normalized.split("/").pop();
      pathEl.textContent = normalized;
      rawEl.href = rawUrl;

      fetch(rawUrl, { cache: "no-store" })
        .then(function (resp) {
          if (!resp.ok) {
            throw new Error("HTTP " + resp.status);
          }
          return resp.text();
        })
        .then(function (md) {
          if (window.marked && typeof window.marked.parse === "function") {
            contentEl.innerHTML = window.marked.parse(md);
          } else {
            contentEl.innerHTML = "<pre></pre>";
            contentEl.querySelector("pre").textContent = md;
          }
        })
        .catch(function (err) {
          contentEl.innerHTML = "<p>加载失败：" + err.message + "</p>";
        });
    })();
  </script>
</body>
</html>
