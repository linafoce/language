---
layout: default
title: 笔记阅读
---
<main class="page-content" aria-label="Content">
  <div class="wrapper">
    <h1 id="note-title">加载中...</h1>
    <p id="note-path"></p>
    <article id="note-body"></article>
  </div>
</main>

<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/github-markdown-css@5.8.1/github-markdown.min.css">
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

<style>
  #note-body.markdown-body {
    box-sizing: border-box;
    min-width: 200px;
    max-width: 980px;
    margin: 0 auto;
    padding: 24px;
    background: #fff;
    border: 1px solid #d0d7de;
    border-radius: 8px;
  }

  #note-path {
    color: #57606a;
    font-size: 14px;
    margin-bottom: 12px;
  }

  @media (max-width: 767px) {
    #note-body.markdown-body {
      padding: 16px;
    }
  }
</style>

<script>
  (function () {
    const params = new URLSearchParams(window.location.search);
    const fileParam = params.get("file");
    const titleEl = document.getElementById("note-title");
    const pathEl = document.getElementById("note-path");
    const bodyEl = document.getElementById("note-body");
    const baseUrl = "{{ site.baseurl }}";

    if (!fileParam) {
      titleEl.textContent = "缺少 file 参数";
      pathEl.textContent = "请从首页点击笔记链接进入。";
      bodyEl.className = "markdown-body";
      bodyEl.innerHTML = "<p>示例：<code>/viewer.html?file=%2Fcourses%2FN2.md</code></p>";
      return;
    }

    const decoded = decodeURIComponent(fileParam);
    const normalizedPath = decoded.startsWith("/") ? decoded : "/" + decoded;
    const safeTitle = normalizedPath.split("/").pop() || normalizedPath;

    titleEl.textContent = safeTitle;
    pathEl.textContent = normalizedPath;

    fetch(baseUrl + normalizedPath, { cache: "no-store" })
      .then((resp) => {
        if (!resp.ok) {
          throw new Error("HTTP " + resp.status);
        }
        return resp.text();
      })
      .then((md) => {
        bodyEl.className = "markdown-body";
        bodyEl.innerHTML = marked.parse(md);
      })
      .catch((err) => {
        bodyEl.className = "markdown-body";
        bodyEl.innerHTML = "<h2>加载失败</h2><p>" + err.message + "</p>";
      });
  })();
</script>
