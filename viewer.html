<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>笔记阅读</title>
  <style>
    :root {
      --bg: #f6f8fa;
      --card: #ffffff;
      --text: #24292f;
      --muted: #57606a;
      --line: #d0d7de;
      --link: #0969da;
    }

    * { box-sizing: border-box; }
    html { scroll-behavior: smooth; }
    body {
      margin: 0;
      font-family: "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.7;
    }

    .wrap {
      max-width: 1280px;
      margin: 24px auto;
      padding: 0 16px;
    }

    .card {
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 10px;
      padding: 16px;
    }

    .head {
      margin-bottom: 16px;
    }

    .meta {
      margin: 0 0 8px;
      color: var(--muted);
      font-size: 14px;
      word-break: break-all;
    }

    .actions {
      margin: 0;
      font-size: 14px;
    }

    .actions a {
      color: var(--link);
      text-decoration: none;
      margin-right: 12px;
    }

    .actions a:hover { text-decoration: underline; }

    .layout {
      display: grid;
      grid-template-columns: minmax(0, 1fr) 280px;
      gap: 16px;
      align-items: start;
    }

    #content {
      min-width: 0;
    }

    #content pre {
      overflow-x: auto;
      background: #f6f8fa;
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 10px;
    }

    #content code {
      background: #f6f8fa;
      border: 1px solid var(--line);
      border-radius: 6px;
      padding: 1px 4px;
    }

    #content blockquote {
      border-left: 4px solid #d0d7de;
      margin: 0;
      padding-left: 12px;
      color: #57606a;
    }

    #content h1,
    #content h2,
    #content h3 {
      scroll-margin-top: 24px;
    }

    .toc-panel {
      position: sticky;
      top: 12px;
      max-height: calc(100vh - 24px);
      overflow: auto;
    }

    .toc-title {
      margin: 0 0 8px;
      font-size: 18px;
    }

    .toc-nav {
      font-size: 14px;
      line-height: 1.5;
    }

    .toc-nav ul {
      list-style: none;
      margin: 0;
      padding: 0;
    }

    .toc-nav li {
      margin: 4px 0;
    }

    .toc-nav a {
      color: #1f2328;
      text-decoration: none;
      display: block;
      padding: 2px 4px;
      border-radius: 4px;
    }

    .toc-nav a:hover {
      background: #f6f8fa;
    }

    .toc-level-2 { margin-left: 12px; }
    .toc-level-3 { margin-left: 24px; }

    .mobile-toc {
      display: none;
      margin-top: 12px;
    }

    .mobile-toc summary {
      cursor: pointer;
      color: var(--link);
      user-select: none;
    }

    @media (max-width: 1024px) {
      .layout {
        grid-template-columns: 1fr;
      }

      .desktop-toc {
        display: none;
      }

      .mobile-toc {
        display: block;
      }
    }
  </style>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
</head>
<body>
  <div class="wrap">
    <section class="card head">
      <h1 id="title">加载中...</h1>
      <p id="path" class="meta"></p>
      <p class="actions">
        <a href="./">返回首页</a>
        <a id="raw-link" target="_blank" rel="noopener noreferrer">打开源文件</a>
      </p>
      <details class="mobile-toc" id="mobile-toc-wrap">
        <summary>目录</summary>
        <nav id="mobile-toc" class="toc-nav"></nav>
      </details>
    </section>

    <section class="layout">
      <article id="content" class="card"></article>
      <aside class="desktop-toc">
        <div class="card toc-panel">
          <h2 class="toc-title">目录</h2>
          <nav id="desktop-toc" class="toc-nav"></nav>
        </div>
      </aside>
    </section>
  </div>

  <script>
    (function () {
      const OWNER = "linafoce";
      const REPO = "language";
      const BRANCH = "main";
      const titleEl = document.getElementById("title");
      const pathEl = document.getElementById("path");
      const contentEl = document.getElementById("content");
      const rawEl = document.getElementById("raw-link");
      const desktopTocEl = document.getElementById("desktop-toc");
      const mobileTocEl = document.getElementById("mobile-toc");
      const mobileTocWrap = document.getElementById("mobile-toc-wrap");

      function slugify(text) {
        const cleaned = text
          .trim()
          .toLowerCase()
          .replace(/\s+/g, "-")
          .replace(/[^\w\u4e00-\u9fa5-]/g, "");
        return cleaned || "section";
      }

      function createTocItem(id, text, level) {
        const li = document.createElement("li");
        li.className = "toc-level-" + level;
        const a = document.createElement("a");
        a.href = "#" + id;
        a.textContent = text;
        li.appendChild(a);
        return li;
      }

      function renderToc() {
        const headings = contentEl.querySelectorAll("h1, h2, h3");
        desktopTocEl.innerHTML = "";
        mobileTocEl.innerHTML = "";

        if (!headings.length) {
          desktopTocEl.innerHTML = "<p>暂无目录</p>";
          mobileTocWrap.open = false;
          mobileTocWrap.style.display = "none";
          return;
        }

        const used = {};
        const desktopList = document.createElement("ul");
        const mobileList = document.createElement("ul");

        headings.forEach(function (heading) {
          const text = heading.textContent.trim();
          const level = Number(heading.tagName.slice(1));
          const base = slugify(text);
          let id = base;
          let n = 2;

          while (used[id]) {
            id = base + "-" + n;
            n += 1;
          }
          used[id] = true;

          heading.id = id;
          desktopList.appendChild(createTocItem(id, text, level));
          mobileList.appendChild(createTocItem(id, text, level));
        });

        desktopTocEl.appendChild(desktopList);
        mobileTocEl.appendChild(mobileList);
        mobileTocWrap.style.display = "block";
      }

      const params = new URLSearchParams(window.location.search);
      const file = params.get("file");

      if (!file) {
        titleEl.textContent = "缺少 file 参数";
        pathEl.textContent = "请从首页进入。";
        contentEl.innerHTML = "<p>示例：<code>viewer.html?file=courses%2FN2.md</code></p>";
        return;
      }

      const normalized = file.replace(/^\/+/, "");
      if (!/^(inbox|courses|topics)\/.+\.md$/i.test(normalized)) {
        titleEl.textContent = "不允许的文件路径";
        pathEl.textContent = normalized;
        contentEl.innerHTML = "<p>仅支持 inbox/courses/topics 下的 .md 文件。</p>";
        return;
      }

      const rawUrl = "https://raw.githubusercontent.com/" + OWNER + "/" + REPO + "/" + BRANCH + "/" + normalized;
      titleEl.textContent = normalized.split("/").pop() || normalized;
      pathEl.textContent = normalized;
      rawEl.href = rawUrl;

      fetch(rawUrl, { cache: "no-store" })
        .then(function (resp) {
          if (!resp.ok) {
            throw new Error("HTTP " + resp.status);
          }
          return resp.text();
        })
        .then(function (md) {
          if (window.marked && typeof window.marked.parse === "function") {
            contentEl.innerHTML = window.marked.parse(md);
          } else {
            contentEl.innerHTML = "<pre></pre>";
            contentEl.querySelector("pre").textContent = md;
          }
          renderToc();
        })
        .catch(function (err) {
          contentEl.innerHTML = "<p>加载失败：" + err.message + "</p>";
        });
    })();
  </script>
</body>
</html>
