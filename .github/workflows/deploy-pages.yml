name: Deploy GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Pages
        uses: actions/configure-pages@v5
      - name: Generate notes index
        run: |
          python3 - <<'PY'
          import json
          import os
          from pathlib import Path

          roots = ("inbox", "courses", "topics")
          notes = []

          for root in roots:
              root_path = Path(root)
              if not root_path.exists():
                  continue
              for item in sorted(root_path.rglob("*.md")):
                  notes.append(item.as_posix())

          payload = {
              "generated_at": os.getenv("GITHUB_RUN_ID", ""),
              "notes": notes
          }

          Path("notes.json").write_text(
              json.dumps(payload, ensure_ascii=False, indent=2),
              encoding="utf-8"
          )
          print(f"Generated notes.json with {len(notes)} files")
          PY
      - name: Build with Jekyll
        uses: actions/jekyll-build-pages@v1
        with:
          source: ./
          destination: ./_site
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
