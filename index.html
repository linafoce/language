<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>日语笔记首页</title>
  <style>
    :root {
      --bg: #f6f8fa;
      --card: #ffffff;
      --text: #24292f;
      --muted: #57606a;
      --line: #d0d7de;
      --link: #0969da;
    }

    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.6;
    }

    .wrap {
      max-width: 1100px;
      margin: 24px auto;
      padding: 0 16px;
    }

    .card {
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 10px;
      padding: 16px;
      margin-bottom: 16px;
    }

    h1 { margin: 0 0 8px; font-size: 28px; }
    p { margin: 0 0 12px; color: var(--muted); }
    a { color: var(--link); text-decoration: none; }
    a:hover { text-decoration: underline; }

    table {
      width: 100%;
      border-collapse: collapse;
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 10px;
      overflow: hidden;
    }

    th, td {
      border-bottom: 1px solid var(--line);
      text-align: left;
      padding: 10px 12px;
      font-size: 14px;
      vertical-align: top;
    }

    tr:last-child td { border-bottom: 0; }
    th { background: #f6f8fa; }

    code {
      background: #f6f8fa;
      border: 1px solid var(--line);
      border-radius: 6px;
      padding: 1px 6px;
      word-break: break-all;
    }

    .tag {
      display: inline-block;
      margin-right: 8px;
      padding: 1px 8px;
      border-radius: 999px;
      border: 1px solid var(--line);
      color: var(--muted);
      font-size: 12px;
      background: #fff;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card">
      <h1>日语笔记首页</h1>
      <p>
        <span class="tag">公开站点</span>
        <span class="tag">自动同步</span>
        <span class="tag">支持多层目录</span>
      </p>
      <p>首页读取站点内 <code>notes.json</code>，不调用 GitHub API，避免手机端 403 限流问题。</p>
      <p id="status">正在加载文件列表...</p>
    </div>

    <table id="notes-table" hidden>
      <thead>
        <tr>
          <th>文件</th>
          <th>阅读</th>
          <th>源文件</th>
        </tr>
      </thead>
      <tbody id="notes-body"></tbody>
    </table>
  </div>

  <script>
    (function () {
      const OWNER = "linafoce";
      const REPO = "language";
      const BRANCH = "main";
      const statusEl = document.getElementById("status");
      const tableEl = document.getElementById("notes-table");
      const bodyEl = document.getElementById("notes-body");

      function fetchNotes() {
        return fetch("notes.json?ts=" + Date.now(), { cache: "no-store" })
          .then(function (resp) {
            if (!resp.ok) {
              throw new Error("HTTP " + resp.status);
            }
            return resp.json();
          })
          .then(function (data) {
            if (Array.isArray(data)) {
              return data;
            }
            if (data && Array.isArray(data.notes)) {
              return data.notes;
            }
            throw new Error("notes.json 格式不正确");
          });
      }

      function isNotePath(path) {
        return /^(inbox|courses|topics)\/.+\.md$/i.test(path);
      }

      function renderRow(path) {
        const tr = document.createElement("tr");
        const rawUrl = "https://raw.githubusercontent.com/" + OWNER + "/" + REPO + "/" + BRANCH + "/" + path;

        const tdPath = document.createElement("td");
        tdPath.innerHTML = "<code>" + path + "</code>";

        const tdViewer = document.createElement("td");
        const viewLink = document.createElement("a");
        viewLink.href = "viewer.html?file=" + encodeURIComponent(path);
        viewLink.textContent = "阅读";
        tdViewer.appendChild(viewLink);

        const tdRaw = document.createElement("td");
        const rawLink = document.createElement("a");
        rawLink.href = rawUrl;
        rawLink.target = "_blank";
        rawLink.rel = "noopener noreferrer";
        rawLink.textContent = "源文件";
        tdRaw.appendChild(rawLink);

        tr.appendChild(tdPath);
        tr.appendChild(tdViewer);
        tr.appendChild(tdRaw);
        bodyEl.appendChild(tr);
      }

      fetchNotes()
        .then(function (paths) {
          const notes = paths
            .filter(function (path) { return typeof path === "string" && isNotePath(path); })
            .sort(function (a, b) { return a.localeCompare(b, "zh-CN"); });

          if (notes.length === 0) {
            statusEl.textContent = "未找到笔记文件。";
            return;
          }

          notes.forEach(renderRow);
          statusEl.textContent = "共找到 " + notes.length + " 个 Markdown 文件。";
          tableEl.hidden = false;
        })
        .catch(function (err) {
          statusEl.textContent = "加载失败：" + err.message + "。请等待 Pages 工作流完成后刷新。";
        });
    })();
  </script>
</body>
</html>
